<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="logo-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#6366F1" />
            <stop offset="100%" stop-color="#06B6D4" />
        </linearGradient>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="10" />
            <feOffset dx="0" dy="4" result="offsetblur" />
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.3" />
            </feComponentTransfer>
            <feMerge>
                <feMergeNode />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>
    
    <!-- Background Circle (Optional, for App Icon feel) -->
    <rect width="512" height="512" rx="128" fill="#0F172A" />
    
    <!-- Abstract Connectivity / 'H' Shape -->
    <g filter="url(#shadow)">
        <!-- Left Pillar -->
        <rect x="140" y="140" width="60" height="232" rx="30" fill="url(#logo-gradient)" />
        
        <!-- Right Pillar -->
        <rect x="312" y="140" width="60" height="232" rx="30" fill="url(#logo-gradient)" />
        
        <!-- Crossbar (Segmented for 'Headless' / Data flow feel) -->
        <rect x="180" y="226" width="152" height="60" rx="30" fill="url(#logo-gradient)" />
        
        <!-- Connectivity Nodes -->
        <circle cx="170" cy="170" r="24" fill="white" fill-opacity="0.2" />
        <circle cx="342" cy="342" r="24" fill="white" fill-opacity="0.2" />
        <circle cx="256" cy="256" r="18" fill="white" />
    </g>
</svg>
